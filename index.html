<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Learning Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 35px;
      color: #111827;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      width: 360px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: black;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.18);
    }

    .image-box {
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .card-content {
      padding: 18px 20px 22px;
      text-align: left;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #111827;
    }

    .subtitle {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.4;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 30px;
      }

      .card {
        width: 100%;
        max-width: 340px;
      }

      .image-box {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <h1>🧠 Math Learning Games</h1>

  <div class="container">
    <a class="card" href="Multiplication.html">
      <div class="image-box">
        <img src="math-preview.png" alt="Multiplication Game Preview">
      </div>
      <div class="card-content">
        <div class="title">➕ Multiplication Game</div>
        <div class="subtitle">Practice multiplication with fun visual questions and interactive activities.</div>
      </div>
    </a>
  </div>

</body>
</html>
