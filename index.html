<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Games</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f8ff;
    text-align: center;
    padding: 30px;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 30px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    transition: 0.2s;
  }

  .card:hover {
    transform: scale(1.03);
  }

  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }

  .title {
    font-size: 20px;
    font-weight: bold;
    margin: 10px 0 5px;
  }

  .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 15px;
  }
</style>
</head>
<body>
  <h1>🎮 My Learning Games</h1>
  <div class="container">
    <a class="card" href="Multiplication.html">
      <img src="Multiplication.png" style="width:100%; border-radius:10px;">
      <div class="title">➕ Multiplication Game</div>
    </a>
  </div>
</body>
</html>
