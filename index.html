<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Games</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f8ff;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      text-decoration: none;
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #e6f0ff;
    }

    .emoji {
      font-size: 50px;
    }

    .title {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>🎮 My Learning Games</h1>

  <div class="container">

    <a class="card" href="Multiplication.html">
      <div class="emoji">➕</div>
      <div class="title">Multiplication Game</div>
    </a>

  </div>

</body>
</html>
