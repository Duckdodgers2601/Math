<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Learning Games</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f8ff;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 220px));
      justify-content: center;
      gap: 25px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      text-decoration: none;
      color: black;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: auto;
      padding: 10px;
      border-radius: 15px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin: 10px 0 15px;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <h1>🧠 Math Learning Games</h1>

  <div class="container">

  <!-- GAME 1 -->
  <a class="card" href="Multiplication-to-5.html">
    <img src="preview2.png" alt="Multiplication 1-5">
    <div class="title">Multiplication 1–5</div>
  </a>

  <!-- GAME 2 -->
  <a class="card" href="Multiplication-1-10.html">
    <img src="Multiplication.png" alt="Multiplication 1-10">
    <div class="title">Multiplication 1-10</div>
  </a>

</div>

</body>
</html>
