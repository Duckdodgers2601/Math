<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Learning Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 25px;
      color: #111827;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      width: 170px;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: black;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .image-box {
      padding: 10px 10px 0 10px;
      background: white;
    }

    .image-box img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .card-content {
      padding: 12px 12px 16px;
      text-align: center;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      color: #111827;
      line-height: 1.3;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 24px;
      }

      .card {
        width: 160px;
      }
    }
  </style>
</head>
<body>

  <h1>🎮 My Learning Games</h1>

  <div class="container">
    <a class="card" href="Multiplication.html">
      <div class="image-box">
        <img src="math-preview.png" alt="Multiplication Game Preview">
      </div>
      <div class="card-content">
        <div class="title">➕ Multiplication Game</div>
      </div>
    </a>
  </div>

</body>
</html>
